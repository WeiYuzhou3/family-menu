<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Family Menu — 离线</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #faf7f2;
      color: #3d3226;
      font-family: 'Inter', system-ui, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      text-align: center;
      padding: 2rem;
    }
    .icon { font-size: 4rem; margin-bottom: 1.5rem; }
    h1 { font-size: 1.5rem; font-weight: 600; margin-bottom: 0.5rem; color: #7c9a6e; }
    p { color: #8b7e6e; font-size: 0.9375rem; line-height: 1.6; }
  </style>
</head>
<body>
  <div>
    <div class="icon">🍳</div>
    <h1>暂无网络连接</h1>
    <p>请连接网络后刷新页面</p>
  </div>
</body>
</html>
